name: Build SamsungMusicPort APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool
        run: wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar

      - name: Install Samsung Framework
        run: |
          mkdir -p ~/.local/share/apktool/framework
          java -jar apktool.jar if SamsungFirmware/1.apk

      - name: Remove problematic files
        run: |
          rm -f res/values/public.xml
          rm -f res/values/ids.xml
          rm -f res/values/attr.xml

      - name: Build APK
        run: java -Xmx4g -jar apktool.jar b -f -o SamsungMusicPort-unsigned.apk .

      - name: Setup keystore
        run: keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        run: jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore debug.keystore -storepass android -keypass android SamsungMusicPort-unsigned.apk androiddebugkey && mv SamsungMusicPort-unsigned.apk SamsungMusicPort-signed.apk

      - name: Zipalign
        run: ${ANDROID_HOME}/build-tools/34.0.0/zipalign -f -v 4 SamsungMusicPort-signed.apk SamsungMusicPort.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SamsungMusicPort-APK
          path: SamsungMusicPort.apk
          retention-days: 30
