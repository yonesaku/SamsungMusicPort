name: Build SamsungMusicPort APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download apktool 3.0.1
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -O apktool.jar

      - name: Get Samsung framework via samloader
        run: |
          pip install samloader --quiet
          mkdir -p SamsungFirmware

          # Download only the CSC/AP portion we need for framework-res.apk
          # We use XAA (unlocked US) region for SM-G991U
          echo "Checking latest firmware version..."
          VERSION=$(python3 -c "
          import samloader.main as s
          import xml.etree.ElementTree as ET
          body = s.getlatestver('SM-G991U', 'XAA')
          root = ET.fromstring(body)
          ver = root.find('.//LATEST_FW_VERSION/o')
          print(ver.text if ver is not None else '')
          " 2>/dev/null || echo "")

          if [ -z "$VERSION" ]; then
            echo "Could not get version automatically, using known good version"
            VERSION="G991USQSJHZB1"
          fi

          echo "Firmware version: $VERSION"

          # Download just the AP (system) zip which contains framework-res.apk
          # This is still large so we'll try a different approach:
          # Use the framework from apktool's built-in android framework
          # and supplement with dummy resources
          echo "Using apktool built-in framework as base"
          java -jar apktool.jar empty-framework-dir --force 2>/dev/null || true
          java -jar apktool.jar if /dev/null 2>/dev/null || true

          # The real fix: use apktool's own android framework (which covers standard resources)
          # Samsung-specific refs in public.xml are what breaks things - we already remove that
          ls -la $HOME/.local/share/apktool/framework/ 2>/dev/null || echo "No framework dir yet"

      - name: Remove problematic public.xml
        run: rm -f res/values/public.xml

      - name: Build APK with apktool
        run: |
          java -Xmx2g -jar apktool.jar b -f -o SamsungMusicPort-unsigned.apk .

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        run: |
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            SamsungMusicPort-unsigned.apk androiddebugkey
          mv SamsungMusicPort-unsigned.apk SamsungMusicPort-signed.apk

      - name: Zipalign APK
        run: |
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -f -v 4 \
            SamsungMusicPort-signed.apk \
            SamsungMusicPort.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SamsungMusicPort
          path: SamsungMusicPort.apk
          retention-days: 30