name: Build SamsungMusicPort APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download apktool 3.0.1
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -O apktool.jar

      - name: Remove unresolvable public.xml entries
        run: |
          # Remove references to missing anim resources that cause aapt2 to fail
          python3 - << 'PYEOF'
          import re, os
          path = "res/values/public.xml"
          if not os.path.exists(path):
              print("public.xml not found, skipping")
              exit()
          with open(path, "r") as f:
              content = f.read()
          # Remove lines referencing anim resources that don't exist
          cleaned = re.sub(r'\s*<public[^/]*/>\s*\n', '\n', content)
          # More targeted: remove lines with type="anim"
          cleaned = re.sub(r'.*type="anim".*\n', '', content)
          with open(path, "w") as f:
              f.write(cleaned)
          print("Cleaned public.xml")
          PYEOF

      - name: Build APK with apktool
        run: |
          java -Xmx2g -jar apktool.jar b -f -o SamsungMusicPort-unsigned.apk .

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        run: |
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            SamsungMusicPort-unsigned.apk androiddebugkey
          mv SamsungMusicPort-unsigned.apk SamsungMusicPort-signed.apk

      - name: Zipalign APK
        run: |
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -f -v 4 \
            SamsungMusicPort-signed.apk \
            SamsungMusicPort.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SamsungMusicPort
          path: SamsungMusicPort.apk
          retention-days: 30