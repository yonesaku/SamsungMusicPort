name: Build Samsung Music Port

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Frameworks
        run: |
          # Install the standard Android framework (optional but recommended)
          # java -jar apktool.jar if framework-res.apk 
          
          # Install your specific Samsung framework
          java -jar apktool.jar if SamsungFirmware/1.apk
          
          # If you have other frameworks in that folder, install them all:
          # for file in SamsungFirmware/*.apk; do java -jar apktool.jar if "$file"; done

      - name: Build APK
        run: |
          java -Xmx4g -jar apktool.jar b -f -o SamsungMusicPort-unsigned.apk .

      - name: Upload Unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: SamsungMusicPort-unsigned
          path: SamsungMusicPort-unsigned.apk
