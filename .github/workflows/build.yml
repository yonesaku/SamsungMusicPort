name: Build SamsungMusicPort APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # lets you trigger it manually from GitHub's website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O apktool
          chmod +x apktool

      - name: Build APK with apktool
        run: |
          java -jar apktool.jar b -f -o SamsungMusicPort-unsigned.apk .

      - name: Generate debug keystore (for signing)
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        run: |
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            SamsungMusicPort-unsigned.apk androiddebugkey

          mv SamsungMusicPort-unsigned.apk SamsungMusicPort-signed.apk

      - name: Zipalign APK
        run: |
          # zipalign comes with Android build tools; grab it from the SDK
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -f -v 4 \
            SamsungMusicPort-signed.apk \
            SamsungMusicPort.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SamsungMusicPort
          path: SamsungMusicPort.apk
          retention-days: 30
