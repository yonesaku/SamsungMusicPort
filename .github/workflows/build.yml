name: Build SamsungMusicPort APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool 3.0.1
        run: |
          echo "Downloading Apktool 3.0.1 (fixes DEX overflow bug)..."
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -O apktool.jar
          chmod +x apktool.jar
          java -jar apktool.jar --version

      - name: Install Samsung Framework
        run: |
          mkdir -p ~/.local/share/apktool/framework
          java -jar apktool.jar if SamsungFirmware/1.apk

      - name: Remove problematic resource files
        run: |
          echo "Removing problematic resource declaration files..."
          rm -f res/values/public.xml
          rm -f res/values/ids.xml
          rm -f res/values/attr.xml
          echo "✓ Problematic files removed"

      - name: Build APK with Apktool 3.0.1
        run: |
          echo "Building with Apktool 3.0.1..."
          java -Xmx4g -jar apktool.jar b -f -o SamsungMusicPort-unsigned.apk .
          echo "✓ APK built successfully!"
          ls -lh SamsungMusicPort-unsigned.apk

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        run: |
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            SamsungMusicPort-unsigned.apk androiddebugkey
          
          mv SamsungMusicPort-unsigned.apk SamsungMusicPort-signed.apk
          echo "✓ APK signed"
          ls -lh SamsungMusicPort-signed.apk

      - name: Zipalign APK
        run: |
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -f -v 4 \
            SamsungMusicPort-signed.apk \
            SamsungMusicPort.apk
          
          echo "✓ Zipalign completed"
          ls -lh SamsungMusicPort.apk

      - name: Verify APK
        run: |
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -c -v 4 SamsungMusicPort.apk
          echo "✓ APK verified and aligned properly"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SamsungMusicPort-APK
          path: SamsungMusicPort.apk
          retention-days: 30

      - name: Create Release
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: SamsungMusicPort.apk
          tag_name: build-${{ github.run_number }}
          body: |
            # SamsungMusicPort Build #${{ github.run_number }}
            
            **Build Details:**
            - Build Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Apktool: 3.0.1
            - Java: 17 (Temurin)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          if [ -f SamsungMusicPort.apk ]; then
            SIZE=$(ls -lh SamsungMusicPort.apk | awk '{print $5}')
            echo "✅ BUILD SUCCESSFUL - APK Size: $SIZE" 
          else
            echo "❌ BUILD FAILED"
          fi
