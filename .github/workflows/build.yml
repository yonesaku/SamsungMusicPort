name: Build SamsungMusicPort APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download apktool 3.0.1
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -O apktool.jar

      - name: Install Samsung Framework
        run: |
          echo "Installing Samsung framework from repository..."
          # This installs the framework so apktool can resolve Samsung-specific resources
          java -jar apktool.jar if SamsungFirmware/1.apk

      - name: Remove problematic public.xml
        run: rm -f res/values/public.xml

      - name: Build APK with apktool
        run: |
          # Increased memory (Xmx2g) to ensure the build doesn't crash
          java -Xmx2g -jar apktool.jar b -f -o SamsungMusicPort-unsigned.apk .

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        run: |
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            SamsungMusicPort-unsigned.apk androiddebugkey
          mv SamsungMusicPort-unsigned.apk SamsungMusicPort-signed.apk

      - name: Zipalign APK
        run: |
          # Uses the built-in Android SDK path in GitHub Actions
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -f -v 4 \
            SamsungMusicPort-signed.apk \
            SamsungMusicPort.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SamsungMusicPort
          path: SamsungMusicPort.apk
          retention-days: 30