name: Build Samsung Music Port

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool
        run: |
          # Get the latest Apktool JAR from GitHub
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -o apktool.jar
          chmod +x apktool.jar

      - name: Install Frameworks
        run: |
          # Verify the framework file exists before trying to install
          if [ -f "SamsungFirmware/1.apk" ]; then
            java -jar apktool.jar if SamsungFirmware/1.apk
          else
            echo "Error: SamsungFirmware/1.apk not found!"
            exit 1
          fi

      - name: Build APK
        run: |
          # The "." refers to the current directory where the decompiled files are
          java -Xmx4g -jar apktool.jar b -f -o SamsungMusicPort-unsigned.apk .

      - name: Upload Unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: SamsungMusicPort-unsigned
          path: SamsungMusicPort-unsigned.apk
