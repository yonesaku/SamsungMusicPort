name: Build SamsungMusicPort APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool 3.0.1
        run: |
          echo "Downloading Apktool 3.0.1..."
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -O apktool.jar
          chmod +x apktool.jar
          java -jar apktool.jar --version

      - name: Setup Samsung Framework
        run: |
          echo "Setting up Samsung framework..."
          mkdir -p $HOME/.local/share/apktool/framework/
          
          # Remove any existing framework installations to ensure clean state
          rm -rf $HOME/.local/share/apktool/framework/*.apk
          
          # Check if SamsungFirmware/1.apk exists
          if [ ! -f "SamsungFirmware/1.apk" ]; then
            echo "ERROR: SamsungFirmware/1.apk not found!"
            ls -la SamsungFirmware/ || echo "SamsungFirmware directory not found"
            exit 1
          fi
          
          echo "Installing Samsung framework from SamsungFirmware/1.apk..."
          java -jar apktool.jar if "SamsungFirmware/1.apk"
          
          # Verify framework was installed (it may be named 1-1.apk or 1.apk)
          echo "Checking installed framework..."
          ls -la $HOME/.local/share/apktool/framework/ | grep -E "\.apk$"
          
          if [ -f "$HOME/.local/share/apktool/framework/1.apk" ] || [ -f "$HOME/.local/share/apktool/framework/1-1.apk" ]; then
            echo "✓ Samsung framework installed successfully"
          else
            echo "ERROR: Framework installation failed!"
            exit 1
          fi

      - name: Clean build artifacts
        run: |
          rm -rf build/ dist/ *.apk *.keystore *.jks
          echo "Build artifacts cleaned"

      - name: Remove problematic resource files
        run: |
          echo "Removing problematic resource declarations..."
          
          # Remove public.xml
          rm -f res/values/public.xml
          
          # Remove ids.xml
          rm -f res/values/ids.xml
          
          # Remove attr.xml (can cause issues)
          rm -f res/values/attr.xml
          
          # List what remains
          echo "Resource files after cleanup:"
          find res/values* -type f -name "*.xml" 2>/dev/null | wc -l

      - name: Validate AndroidManifest.xml
        run: |
          echo "Validating AndroidManifest.xml..."
          if [ ! -f "AndroidManifest.xml" ]; then
            echo "ERROR: AndroidManifest.xml not found!"
            exit 1
          fi
          
          # Check for obvious issues
          head -20 AndroidManifest.xml
          echo "..."
          tail -5 AndroidManifest.xml

      - name: Build APK with Apktool (with AAPT2 debug)
        run: |
          echo "Starting APK build..."
          
          # Set environment to show more AAPT2 details
          export JAVA_TOOL_OPTIONS="-Dapktool.aapt2.debug=true"
          
          java -Xmx4g -jar apktool.jar b \
            -f \
            -v \
            -o SamsungMusicPort-unsigned.apk \
            . 2>&1 | tee build.log
          
          BUILD_STATUS=${PIPESTATUS[0]}
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo ""
            echo "=== BUILD FAILED - Showing last 100 lines of log ==="
            tail -100 build.log
            exit $BUILD_STATUS
          fi
          
          echo "APK build completed successfully!"
          ls -lh SamsungMusicPort-unsigned.apk

      - name: Verify APK
        if: success()
        run: |
          echo "Verifying APK integrity..."
          file SamsungMusicPort-unsigned.apk
          unzip -l SamsungMusicPort-unsigned.apk | head -30

      - name: Generate debug keystore
        if: success()
        run: |
          echo "Generating debug keystore..."
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        if: success()
        run: |
          echo "Signing APK with debug key..."
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            SamsungMusicPort-unsigned.apk androiddebugkey
          
          mv SamsungMusicPort-unsigned.apk SamsungMusicPort-signed.apk
          ls -lh SamsungMusicPort-signed.apk

      - name: Zipalign APK
        if: success()
        run: |
          echo "Zipaligning APK for optimization..."
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -f -v 4 \
            SamsungMusicPort-signed.apk \
            SamsungMusicPort.apk
          
          echo "Zipalign completed"
          ls -lh SamsungMusicPort.apk

      - name: Verify Zipalign
        if: success()
        run: |
          echo "Verifying zipalign..."
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -c -v 4 SamsungMusicPort.apk

      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SamsungMusicPort-APK
          path: SamsungMusicPort.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Create GitHub Release
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: SamsungMusicPort.apk
          tag_name: build-${{ github.run_number }}
          body: |
            # SamsungMusicPort Build #${{ github.run_number }}
            
            **Build Information:**
            - Build Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Branch: main
            
            **Build System:**
            - Apktool: 3.0.1
            - Java: 17 (Temurin)
            - Framework: Samsung (SamsungFirmware/1.apk)
            
            **APK Details:**
            - Package: com.sec.android.app.music
            - Min SDK: 23
            - Target SDK: 30
            
            Download the APK file to install on your device.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Job Summary
        if: always()
        run: |
          echo "## Build Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f SamsungMusicPort.apk ]; then
            SIZE=$(ls -lh SamsungMusicPort.apk | awk '{print $5}')
            echo "**✓ APK Built Successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "- **Filename:** SamsungMusicPort.apk" >> $GITHUB_STEP_SUMMARY
            echo "- **Size:** $SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "**✗ Build Failed**" >> $GITHUB_STEP_SUMMARY
            if [ -f build.log ]; then
              echo "Check the build log artifact for details" >> $GITHUB_STEP_SUMMARY
            fi
          fi
